plugin:
  name: custom-data-type-cerlthesaurus
  version: 2.0
  url: https://github.com/programmfabrik/fylr-plugin-custom-data-type-cerlthesaurus
  displayname:
    de-DE: CERL-Thesaurus-Verknüpfung
    en-US: CERL-Thesaurus-Referencing
  info:
    de-DE: Stellt Verknüpfungen mit de, CERL-Thesaurus her.
    en-US: Use for references to to entities of the CERL-Thesaurus.
  l10n: l10n/customDataTypeCERLThesaurus.csv
  webfrontend:
    url: customDataTypeCERLThesaurus.js
    css: customDataTypeCERLThesaurus.css
    dependencies:
      - commons-library
    
base_url_prefix: "webfrontend"

custom_types:
  cerlthesaurus:
    mapping:
      conceptName:
        type: text
      conceptURI:
        type: text
      facetTerm:
        type: text_l10n
    config:
      mask:
        - name: allow_placename
          parameters:
            value:
              type: bool
        - name: allow_imprintname
          parameters:
            value:
              type: bool
        - name: allow_personalname
          parameters:
            value:
              type: bool
        - name: allow_corporatename
          parameters:
            value:
              type: bool

    update:
      plugin_user:
        reference: system:root
      exec:
        service: "node"
        commands:
          - prog: "node"
            stdin:
              type: body
            stdout:
              type: body
            args:
              - type: "value"
                value: "%_exec.pluginDir%/updater/CERLThesaurusUpdater.js"
              - type: "value"
                value: "%info.json%"
      timeout: 60
      batch_size: 1
      expires_days: 1

base_config:
  - name: update_cerlthesaurus
    group: update_custom_data_type
    parameters:
      restrict_time:
        type: bool
        default: false
        position: 0
      from_time:
        type: int
        default: 19
        min: 0
        max: 24
        position: 1
      to_time:
        type: int
        default: 4
        min: 0
        max: 24
        position: 2 
      custom_expires_days:
        type: int
        min: 1
        default: 1
        position: 3        